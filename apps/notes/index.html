<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F39C12">
  <title>Notes - MarlApps</title>
  <link rel="icon" type="image/x-icon" href="../../favicon.ico">
  <script src="../../themes/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="notes-main">
      <div class="notes-layout">
        <aside class="notes-sidebar">
          <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
          </div>
          <div class="notes-list" id="notesList"></div>
          <button id="newNoteBtn" class="fab-new-note" title="New note (Ctrl+N)">+</button>
        </aside>

        <div class="note-editor-container">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📝</div>
            <h2>No note selected</h2>
            <p>Select a note from the list or create a new one</p>
          </div>

          <div class="note-editor" id="noteEditor" style="display: none;">
            <button class="mobile-back-btn" id="mobileBackBtn">&larr; Notes</button>
            <input
              type="text"
              id="noteTitleInput"
              class="note-title-input"
              placeholder="Note title..."
              autocomplete="off"
            >
            <div class="editor-toolbar" id="editorToolbar">
              <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
              <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
              <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
              <span class="toolbar-divider"></span>
              <button data-cmd="insertUnorderedList" title="Bullet list">•</button>
              <button data-cmd="insertOrderedList" title="Numbered list">1.</button>
              <span class="toolbar-divider"></span>
              <button data-cmd="formatBlock" data-value="p" title="Paragraph">P</button>
              <button data-cmd="formatBlock" data-value="h1" title="Heading 1">H1</button>
              <button data-cmd="formatBlock" data-value="h2" title="Heading 2">H2</button>
              <button data-cmd="formatBlock" data-value="h3" title="Heading 3">H3</button>
              <span class="toolbar-divider"></span>
              <button data-cmd="insertHorizontalRule" title="Separator">―</button>
            </div>
            <div
              id="editorContent"
              class="editor-content"
              placeholder="Start typing your note..."
            ></div>
            <div class="note-footer">
              <div class="note-footer-left">
                <span class="save-status" id="saveStatus">Saved</span>
                <span class="footer-dot">·</span>
                <span class="note-date" id="noteDate"></span>
              </div>
              <div class="note-footer-right">
                <button id="exportMdBtn" class="btn btn-secondary btn-sm">Export .md</button>
                <button id="deleteNoteBtn" class="btn btn-danger btn-sm">Delete</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
