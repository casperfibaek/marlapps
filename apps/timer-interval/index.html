<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3B82F6">
  <title>Timer - Interval - MarlApps</title>
  <link rel="icon" type="image/x-icon" href="../../favicon.ico">
  <script src="../../themes/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="timer-main" role="main" aria-label="Interval timer">
      <section class="hero-stage">
        <div class="hero-ring" id="heroRing" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="hero-ring-inner">
            <div class="hero-label" id="heroLabel">Ready</div>
            <div class="hero-value" id="heroValue">00:00</div>
            <button type="button" class="hero-action-btn" id="openSettingsBtn">Settings</button>
          </div>
        </div>
      </section>

      <div class="interval-progress" id="intervalProgress">8 rounds</div>

      <div class="controls-group interval-controls">
        <button type="button" class="btn btn-primary" id="intervalStartBtn">Start</button>
        <button type="button" class="btn btn-outline" id="intervalPauseBtn" disabled>Pause</button>
        <button type="button" class="btn btn-outline" id="intervalResetBtn">Reset</button>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" aria-hidden="true">
    <div class="modal-content" id="settingsPanel" tabindex="-1">
      <div class="modal-header">
        <h3 id="settingsTitle">Interval settings</h3>
        <button type="button" class="modal-close" id="settingsClose" aria-label="Close interval settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="settings-grid">
          <div class="setting-card">
            <label for="intervalWork">Work (seconds)</label>
            <input type="number" id="intervalWork" min="5" max="3600" value="30">
          </div>
          <div class="setting-card">
            <label for="intervalRest">Rest (seconds)</label>
            <input type="number" id="intervalRest" min="5" max="3600" value="10">
          </div>
          <div class="setting-card">
            <label for="intervalRounds">Rounds</label>
            <input type="number" id="intervalRounds" min="1" max="99" value="8">
          </div>
        </div>
        <button type="button" class="btn btn-primary btn-block" id="applySettingsBtn">Apply settings</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
